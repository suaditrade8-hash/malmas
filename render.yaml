# ============================================================
# ملمس · Render Blueprint
# يُقرأ تلقائياً من Render عند ربط المستودع — يُنشئ الخدمة بالضبط كما هو موصوف
# ============================================================

services:
  - type: web
    name: malmas
    env: python
    plan: free
    region: frankfurt
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
